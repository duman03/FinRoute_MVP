worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:3001;
        keepalive 32;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    server {
        listen 80;
        server_name finrouteapp.com api.finrouteapp.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name finrouteapp.com;

        ssl_certificate /etc/letsencrypt/live/finrouteapp.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/finrouteapp.com/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        root /usr/share/nginx/html;

        location = /privacy {
            try_files /privacy/index.html =404;
        }

        location = /delete-account {
            try_files /delete-account/index.html =404;
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }

    server {
        listen 443 ssl http2;
        server_name api.finrouteapp.com;

        ssl_certificate /etc/letsencrypt/live/finrouteapp.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/finrouteapp.com/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_cache_bypass $http_upgrade;
        }

        location /health {
            proxy_pass http://backend/api/v1/health;
        }

        location / {
            return 404;
        }
    }
}
