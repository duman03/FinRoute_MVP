services:
  postgres:
    image: postgres:15-alpine
    container_name: finroute-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finroute}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finroute_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-finroute_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U finroute -d finroute_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finroute-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finroute-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-finroute}:${POSTGRES_PASSWORD:-finroute_dev_2026}@postgres:5432/${POSTGRES_DB:-finroute_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-finroute_jwt_secret_dev_2026}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-finroute_jwt_refresh_secret_dev_2026}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-demo}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/migrations:/app/migrations
    command: npx nodemon

  nginx:
    image: nginx:alpine
    container_name: finroute-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
